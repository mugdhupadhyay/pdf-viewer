<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PDF Inverter</title>
  <style>
    body {
      background-color: black;
      color: white;
      margin: 0;
      overflow-x: auto; /* enable horizontal scrolling */
    }
    #pdf-viewer {
      display: flex; /* lay pages side by side */
      flex-direction: row;
      gap: 20px; /* spacing between pages */
      padding: 20px;
    }
    canvas {
      flex: 0 0 auto; /* prevent shrinking */
      image-rendering: crisp-edges; /* sharpen tables/lines */
      filter: invert(1) hue-rotate(180deg);
      border: 1px solid #444;
    }
  </style>
</head>
<body>
  <div id="pdf-viewer"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
  <script>
    const url = 'Solutions.pdf'; // must match your file name exactly
    const container = document.getElementById('pdf-viewer');

    pdfjsLib.getDocument(url).promise
      .then(pdf => {
        let pageNum = 1;

        function renderNextPage() {
          if (pageNum > pdf.numPages) return;

          pdf.getPage(pageNum).then(page => {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            const viewport = page.getViewport({ scale: 2.0 }); // adjust quality
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            page.render({ canvasContext: context, viewport: viewport }).promise.then(() => {
              container.appendChild(canvas);
              pageNum++;
              renderNextPage(); // render the next page only after this one finishes
            });
          });
        }

        renderNextPage(); // start with page 1
      })
      .catch(err => {
        console.error('Error loading PDF:', err);
        container.innerHTML = "<p style='color:white'>Failed to load PDF. Check filename and path.</p>";
      });
  </script>
</body>
</html>
